<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1128px;
    height: 191px;
    background: #070809;
    overflow: hidden;
  }

  /* ── Canvas ── */
  .banner {
    width: 1128px;
    height: 191px;
    background: #070809;
    position: relative;
    overflow: hidden;
  }

  /* Grid overlay */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,217,126,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,217,126,0.022) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glows */
  .glow-center {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 560px;
    height: 260px;
    background: radial-gradient(ellipse, rgba(0,217,126,0.08) 0%, rgba(0,217,126,0.02) 50%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  .glow-right {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(0,217,126,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Left block: logo (absolute, left-anchored) ── */
  .left {
    position: absolute;
    left: 38px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 7px;
    z-index: 2;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, rgba(0,217,126,0.18) 0%, rgba(0,217,126,0.06) 100%);
    border: 1.5px solid rgba(0,217,126,0.35);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 14px rgba(0,217,126,0.13);
    flex-shrink: 0;
  }

  .logo-s {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: #00d97e;
    text-shadow: 0 0 12px rgba(0,217,126,0.55);
    line-height: 1;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #e8ecf0;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }

  .logo-name span { color: #00d97e; }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 400;
    color: rgba(232,236,240,0.32);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    padding-left: 1px;
  }

  /* ── Vertical dividers (absolute) ── */
  .div-left {
    position: absolute;
    left: 252px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 88px;
    background: linear-gradient(to bottom, transparent, rgba(0,217,126,0.22) 30%, rgba(0,217,126,0.22) 70%, transparent);
    z-index: 2;
  }

  .div-right {
    position: absolute;
    right: 208px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 88px;
    background: linear-gradient(to bottom, transparent, rgba(0,217,126,0.22) 30%, rgba(0,217,126,0.22) 70%, transparent);
    z-index: 2;
  }

  /* ── Center: headline (absolutely centered) ── */
  .center {
    position: absolute;
    left: 272px;
    right: 228px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    line-height: 1.2;
    color: #e8ecf0;
    letter-spacing: -0.2px;
    text-align: center;
  }

  .headline em {
    font-style: normal;
    color: #00d97e;
    text-shadow: 0 0 22px rgba(0,217,126,0.4);
  }

  /* ── Right: stat cards (absolute, right-anchored) ── */
  .right {
    position: absolute;
    right: 36px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 9px;
    z-index: 2;
  }

  .stat-card {
    background: rgba(14, 18, 22, 0.9);
    border: 1px solid rgba(0,217,126,0.22);
    border-radius: 7px;
    padding: 7px 13px;
    width: 148px;
  }

  .stat-card .val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #00d97e;
    line-height: 1;
    text-shadow: 0 0 12px rgba(0,217,126,0.38);
  }

  .stat-card .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    color: rgba(232,236,240,0.38);
    margin-top: 2px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* ── Bottom accent line ── */
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,217,126,0.12) 8%,
      rgba(0,217,126,0.5) 30%,
      rgba(0,217,126,0.5) 70%,
      rgba(0,217,126,0.12) 92%,
      transparent 100%);
    z-index: 3;
  }

  /* ── Top accent line ── */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,217,126,0.06) 20%,
      rgba(0,217,126,0.16) 50%,
      rgba(0,217,126,0.06) 80%,
      transparent 100%);
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="glow-center"></div>
    <div class="glow-right"></div>
    <div class="top-accent"></div>

    <!-- Left: logo + wordmark -->
    <div class="left">
      <div class="logo-row">
        <div class="logo-icon">
          <span class="logo-s">S</span>
        </div>
        <div class="logo-name">SaaS<span>-</span>Scrub</div>
      </div>
      <div class="tagline">SaaS Cost Intelligence</div>
    </div>

    <!-- Dividers -->
    <div class="div-left"></div>
    <div class="div-right"></div>

    <!-- Center: headline -->
    <div class="center">
      <div class="headline">
        Stop paying for software<br><em>nobody uses.</em>
      </div>
    </div>

    <!-- Right: stat cards -->
    <div class="right">
      <div class="stat-card">
        <div class="val">$299/mo</div>
        <div class="label">flat rate, no contract</div>
      </div>
      <div class="stat-card">
        <div class="val">49 months</div>
        <div class="label">runway &amp; growing</div>
      </div>
    </div>

    <div class="bottom-accent"></div>
  </div>
</body>
</html>
