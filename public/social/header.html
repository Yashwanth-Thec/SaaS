<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1500px;
    height: 500px;
    background: #070809;
    overflow: hidden;
  }

  .header {
    width: 1500px;
    height: 500px;
    background: #070809;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 90px;
    overflow: hidden;
  }

  /* Subtle grid overlay */
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,217,126,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,217,126,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Right glow blob */
  .glow-right {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    width: 550px;
    height: 550px;
    background: radial-gradient(circle, rgba(0,217,126,0.10) 0%, rgba(0,217,126,0.03) 45%, transparent 70%);
    pointer-events: none;
  }

  /* Left glow */
  .glow-left {
    position: absolute;
    left: -80px;
    top: 20%;
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(46,217,255,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Floating stat cards */
  .stat-card {
    position: absolute;
    background: rgba(18, 21, 24, 0.85);
    border: 1px solid rgba(0,217,126,0.18);
    border-radius: 12px;
    padding: 14px 20px;
    backdrop-filter: blur(8px);
  }

  .stat-card .val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #00d97e;
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,217,126,0.4);
  }

  .stat-card .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: rgba(232,236,240,0.45);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .card-1 { right: 140px; top: 68px; }
  .card-2 { right: 340px; bottom: 72px; }
  .card-3 { right: 100px; bottom: 82px; }

  /* Scan line decoration */
  .scan-line {
    position: absolute;
    right: 80px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(0,217,126,0.15) 30%, rgba(0,217,126,0.15) 70%, transparent);
  }

  /* Left content */
  .left-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    max-width: 820px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 62px;
    height: 62px;
    background: linear-gradient(135deg, rgba(0,217,126,0.15) 0%, rgba(0,217,126,0.05) 100%);
    border: 1.5px solid rgba(0,217,126,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 24px rgba(0,217,126,0.1);
  }

  .logo-s {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 34px;
    color: #00d97e;
    text-shadow: 0 0 20px rgba(0,217,126,0.5);
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #e8ecf0;
    letter-spacing: 1px;
  }

  .logo-name span { color: #00d97e; }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 52px;
    line-height: 1.05;
    color: #e8ecf0;
    letter-spacing: -1px;
  }

  .headline em {
    font-style: normal;
    color: #00d97e;
    text-shadow: 0 0 30px rgba(0,217,126,0.35);
  }

  .sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 19px;
    color: rgba(232,236,240,0.5);
    margin-top: 16px;
    line-height: 1.5;
    max-width: 620px;
  }

  .badge-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(18, 21, 24, 0.7);
    border: 1px solid rgba(0,217,126,0.2);
    border-radius: 999px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: rgba(232,236,240,0.7);
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    background: #00d97e;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(0,217,126,0.8);
    flex-shrink: 0;
  }

  .price-badge {
    background: rgba(0,217,126,0.1);
    border-color: rgba(0,217,126,0.35);
    color: #00d97e;
    font-weight: 500;
  }

  /* Bottom border accent */
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,217,126,0.4) 40%, rgba(0,217,126,0.4) 60%, transparent);
  }
</style>
</head>
<body>
  <div class="header">
    <div class="glow-left"></div>
    <div class="glow-right"></div>
    <div class="scan-line"></div>

    <!-- Stat cards (right side) -->
    <div class="stat-card card-1">
      <div class="val">$84K</div>
      <div class="label">avg annual savings found</div>
    </div>
    <div class="stat-card card-2">
      <div class="val">$299</div>
      <div class="label">per month, no contract</div>
    </div>
    <div class="stat-card card-3">
      <div class="val">47 apps</div>
      <div class="label">avg zombie tools found</div>
    </div>

    <!-- Main content (left) -->
    <div class="left-content">
      <div class="logo-row">
        <div class="logo-icon">
          <span class="logo-s">S</span>
        </div>
        <div class="logo-name">SaaS<span>-</span>Scrub</div>
      </div>

      <div class="headline">
        Stop paying for<br>
        software <em>nobody uses.</em>
      </div>

      <div class="sub">
        Zombie app detection · AI redundancy analysis · Auto offboarding
      </div>

      <div class="badge-row">
        <div class="badge price-badge">
          <div class="badge-dot"></div>
          $299/month
        </div>
        <div class="badge">
          <div class="badge-dot"></div>
          No enterprise contract
        </div>
        <div class="badge">
          <div class="badge-dot"></div>
          Connects in 2 minutes
        </div>
      </div>
    </div>

    <div class="bottom-accent"></div>
  </div>
</body>
</html>
